<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


<!-- The page title in the tab -->
    <title>Your Gallery</title>

<!-- Camera icon in the tab-->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">

<!-- the style of the gallery can be changed by choosing different style files
    style1 = grid
    style2 = 1 image per row, good for people who love long descriptions
    see documentation for examples
-->
    <link rel="stylesheet" href="styles/style1.css">


<!-- the main style is jutt the header and background colors -->
    <link rel="stylesheet" href="styles/main_style.css">

</head>



<body>

    <header>
<!-- The title in the header at the top -->
        <h1>
            Your Gallery
        </h1>
<!-- contact links, swap @yourhandle for the actual one, remove whatever you don't want -->
          <div class="contact-icons">

            <a href="https://instagram.com/yourhandle" aria-label="Instagram" target="_blank" rel="noopener">
              <i class="fa-brands fa-instagram"></i>
            </a>

            <a href="https://facebook.com/yourhandle" aria-label="Facebook" target="_blank" rel="noopener">
              <i class="fa-brands fa-facebook"></i>
            </a>

            <a href="https://www.tiktok.com/@yourhandle" aria-label="TikTok" target="_blank" rel="noopener">
                <i class="fa-brands fa-tiktok"></i>
            </a>

          </div>

    </header>

  <main>


        <!-- Album selector -->
        <div class="album-selector">

        

            <button class="album-btn"
                    onclick="showGallery('trees_gallery', this)">
                Trees
            </button>


            <button class="album-btn"
                    onclick="showGallery('new_album_gallery', this)">
                New Album
            </button>
</div>


<!--
placing text between the <figcaption></figcaption> tag under a photo will display that same text on hoover like a description
-->

<!-- ALL GALLERIES PLACEHOLDER START -->

    

            </div>
        </div>


    <!-- Trees -->
    <div id="trees_gallery" class="gallery-grid gallery">
        <div class="gallery-grid">

            <!-- trees PLACEHOLDER START -->
              <figure class="photo">
                <input type="checkbox" id="trees_p2" class="photo-toggle">
                <label for="trees_p2" class="photo-tap">
                  <img src="photos/trees/test5.jpg" alt="test5" loading="lazy">
                  <figcaption> hello i am a cute frog qwiggit :) </figcaption>
                </label>
              </figure>

            <!-- trees PLACEHOLDER END -->

            </div>
        </div>


    <!-- New Album -->
    <div id="new_album_gallery" class="gallery-grid gallery">
        <div class="gallery-grid">

            <!-- new_album PLACEHOLDER START -->
              <figure class="photo">
                <input type="checkbox" id="new_album_p1" class="photo-toggle">
                <label for="new_album_p1" class="photo-tap">
                  <img src="photos/new album/test5.jpg" alt="test5" loading="lazy">
                  <figcaption></figcaption>
                </label>
              </figure>

              <figure class="photo">
                <input type="checkbox" id="new_album_p2" class="photo-toggle">
                <label for="new_album_p2" class="photo-tap">
                  <img src="photos/new album/travel1.jpg" alt="travel1" loading="lazy">
                  <figcaption></figcaption>
                </label>
              </figure>

              <figure class="photo">
                <input type="checkbox" id="new_album_p3" class="photo-toggle">
                <label for="new_album_p3" class="photo-tap">
                  <img src="photos/new album/travel2.jpeg" alt="travel2" loading="lazy">
                  <figcaption></figcaption>
                </label>
              </figure>

            <!-- new_album PLACEHOLDER END -->

            </div>
        </div>


<!-- ALL GALLERIES PLACEHOLDER END -->


  </main>

    <footer>
        <h1>
            Photographer: You
        </h1>
      <p>
        Website template developed by Yoana Bastiyanova
        <a href="https://github.com/YoanaBast" aria-label="GitHub" target="_blank" rel="noopener">
          <i class="fa-brands fa-github"></i>
        </a>
      </p>
    </footer>


</body>
</html>

<script>
function showGallery(id, button){

    // Hide all galleries
    document.querySelectorAll(".gallery").forEach(gallery=>{
        gallery.classList.remove("active-gallery");
    });

    // Remove active button
    document.querySelectorAll(".album-btn").forEach(btn=>{
        btn.classList.remove("active");
    });

    // Show chosen gallery
    document.getElementById(id).classList.add("active-gallery");

    // Highlight button
    button.classList.add("active");
}
</script>
